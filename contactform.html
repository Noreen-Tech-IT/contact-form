<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact in html</title>
</head>
<body>
    <section id="contact" style=
                            "height:1000vh;
                            justify-content:center;
                            align-items:center;
                            display:flex">
        <form action="#" method="post" style=
                                        "width:400px;
                                        padding:20px;
                                        background-color: #bb84311a;
                                        border:2px solid black;">
            <h2>CONTACT ME</h2>
            <label for="name">Full name:</label>
            <input type="text" id="name" name="name" placeholder=" Enter your full name" required><br><br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>
            <label for="number">Phone no:</label>
            <input type="tel" id="number" name="number" placeholder="923408876431" required><br><br>
            <label for="message">Your message:</label>
            <textarea rows="4" id="message" name="message" placeholder="please enter your queries:"required></textarea><br><br>
            <input type="submit" value="submit">
        </form>
    </section>
    
</body>
</html>
